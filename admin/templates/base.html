<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel{% endblock %} — CarIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: { 450: '#f5b942' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0a0a0c; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-zinc-200 min-h-screen">
    {% if request.session.get('logged_in') %}
    <nav class="bg-[#111113] border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <span class="text-lg font-semibold text-amber-450 tracking-wide">🚘 CarIA <span class="text-zinc-500 font-normal text-sm">painel</span></span>
            <div class="flex gap-1 text-sm">
                <a href="/admin/dashboard" class="px-3 py-2 rounded-md hover:bg-zinc-800 transition {% if request.url.path == '/admin/dashboard' %}bg-zinc-800 text-amber-450{% endif %}">Dashboard</a>
                <a href="/admin/vehicles" class="px-3 py-2 rounded-md hover:bg-zinc-800 transition {% if request.url.path == '/admin/vehicles' %}bg-zinc-800 text-amber-450{% endif %}">Veículos</a>
                <a href="/admin/leads" class="px-3 py-2 rounded-md hover:bg-zinc-800 transition {% if '/admin/leads' in request.url.path %}bg-zinc-800 text-amber-450{% endif %}">Leads</a>
                <a href="/admin/sync" class="px-3 py-2 rounded-md hover:bg-zinc-800 transition {% if request.url.path == '/admin/sync' %}bg-zinc-800 text-amber-450{% endif %}">Sincronização</a>
                <a href="/admin/testar-bot" class="px-3 py-2 rounded-md hover:bg-zinc-800 transition {% if request.url.path == '/admin/testar-bot' %}bg-zinc-800 text-amber-450{% endif %}">Testar Bot</a>
            </div>
        </div>
        <a href="/admin/logout" class="text-sm text-zinc-400 hover:text-zinc-200 transition">Sair</a>
    </nav>
    {% endif %}

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
